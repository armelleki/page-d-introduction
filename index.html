<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armelle Oussou - Développeur Frontend</title>
    
    <!-- Meta tags pour le SEO -->
    <meta name="description" content="Portfolio d'Armelle Oussou, Développeur Frontend passionné par la création de sites web modernes et interactifs.">
    
    <!-- Google Fonts: Inter pour un look moderne et épuré -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome pour les icônes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Fichier CSS personnalisé -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hero Section Principale -->
    <header class="hero-section d-flex align-items-center justify-content-center text-center">
        <!-- Overlay pour assombrir l'image de fond et améliorer le contraste -->
        <div class="hero-overlay"></div>
        
        <!-- Contenu centré -->
        <div class="container position-relative z-index-1">
            <div class="row justify-content-center">
                <div class="col-11 col-md-8 col-lg-7 content-wrapper">
                    
                    <!-- Icône décorative animée -->
                    <div class="icon-container mb-4 fade-in-up" style="animation-delay: 0.2s;">
                        <i class="fa-solid fa-code"></i>
                    </div>
                    
                    <!-- Titre principal -->
                    <h1 class="display-3 fw-bold text-white mb-3 fade-in-up" style="animation-delay: 0.4s;">
                        Armelle Oussou
                    </h1>
                    
                    <!-- Sous-titre -->
                    <p class="lead text-light mb-5 subtitle fade-in-up" style="animation-delay: 0.6s;">
                        Développeur Frontend passionné par la création de sites web modernes et interactifs.
                    </p>
                    
                    <!-- Bouton d'appel à l'action -->
                    <div class="fade-in-up" style="animation-delay: 0.8s;">
                        <a href="#projets" class="btn btn-custom btn-lg">
                            Voir mes projets <i class="fa-solid fa-arrow-right ms-2 btn-icon"></i>
                        </a>
                    </div>
                    
                </div>
            </div>
        </div>
        
        <!-- Particules esthétiques optionnelles (HTML pur) -->
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
    </header>

    <!-- Bootstrap JS (Optionnel pour les composants interactifs futurs) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
